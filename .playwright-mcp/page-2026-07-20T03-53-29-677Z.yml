          - generic [ref=e430]:
            - heading "栈" [level=1] [ref=e431]
            - heading "一、定义" [level=2] [ref=e432]
            - paragraph [ref=e433]:
              - text: 栈（Stack）是一种受限的线性数据结构，其核心特征是
              - strong [ref=e434]: 后进先出
              - text: （Last In, First Out, LIFO）。在栈中，所有元素的插入（入栈，Push）和删除（出栈，Pop）操作都只能在栈顶（Top）进行。栈底（Bottom）是固定的，不允许直接访问。
            - paragraph [ref=e435]:
              - text: 从抽象数据类型（ADT）的角度，栈可形式化定义为一个二元组
              - code [ref=e436]: (S, op)
              - text: ，其中
              - code [ref=e437]: S
              - text: 是元素集合，
              - code [ref=e438]: op
              - text: 是操作集合，主要包括：
            - list [ref=e439]:
              - listitem [ref=e440]:
                - code [ref=e441]: Push(S, x)
                - text: ": 将元素"
                - code [ref=e442]: x
                - text: 插入栈顶。
              - listitem [ref=e443]:
                - code [ref=e444]: Pop(S)
                - text: ": 删除并返回栈顶元素。"
              - listitem [ref=e445]:
                - code [ref=e446]: Top(S)
                - text: ": 返回栈顶元素但不删除。"
              - listitem [ref=e447]:
                - code [ref=e448]: IsEmpty(S)
                - text: ": 判断栈是否为空。"
            - paragraph [ref=e449]:
              - text: 若用
              - link "数组" [ref=e450] [cursor=pointer]:
                - /url: "#/wiki/%E6%95%B0%E7%BB%84"
              - text: 实现，栈的数学状态可用栈顶指针
              - code [ref=e451]: top
              - text: 描述：
              - code [ref=e452]: top
              - text: 指向当前栈顶元素的位置。初始时
              - code [ref=e453]: top = -1
              - text: 表示空栈。入栈时
              - code [ref=e454]: top ← top + 1
              - text: ，出栈时
              - code [ref=e455]: top ← top - 1
              - text: 。栈中元素个数为
              - code [ref=e456]: top + 1
              - text: 。
            - heading "二、核心原理" [level=2] [ref=e457]
            - list [ref=e458]:
              - listitem [ref=e459]:
                - paragraph [ref=e460]:
                  - strong [ref=e461]: LIFO 机制
                  - text: ：栈的核心思想是“后进先出”。最后进入栈的元素总是最先被取出。这一特性使得栈天然适合处理需要“回溯”或“撤销”的场景，如函数调用、括号匹配、表达式求值等。
              - listitem [ref=e462]:
                - paragraph [ref=e463]:
                  - strong [ref=e464]: 单端操作
                  - text: ：所有操作（插入、删除、读取）均限定在栈顶。这意味着栈无法像数组或
                  - link "链表" [ref=e465] [cursor=pointer]:
                    - /url: "#/wiki/linked-list"
                  - text: 那样随机访问中间元素。这种限制虽然降低了灵活性，但换来了操作的高效性和确定性。
              - listitem [ref=e466]:
                - paragraph [ref=e467]:
                  - strong [ref=e468]: 栈顶指针
                  - text: ：在数组实现中，栈顶指针
                  - code [ref=e469]: top
                  - text: 是核心状态变量。它记录了当前栈中元素的数量和位置。入栈时
                  - code [ref=e470]: top
                  - text: 增加，出栈时
                  - code [ref=e471]: top
                  - text: 减少。当
                  - code [ref=e472]: top = -1
                  - text: 时栈空，当
                  - code [ref=e473]: top = MAX_SIZE - 1
                  - text: 时栈满（若容量固定）。
              - listitem [ref=e474]:
                - paragraph [ref=e475]:
                  - strong [ref=e476]: 递归与栈的等价性
                  - text: ：任何递归算法都可以用栈来模拟。递归调用本质上是系统隐式维护了一个“调用栈”，每次函数调用将返回地址和局部变量压栈，返回时出栈。因此，栈是理解递归、
                  - link "深度优先搜索" [ref=e477] [cursor=pointer]:
                    - /url: "#/wiki/dfs"
                  - text: （DFS）等算法的基础。
              - listitem [ref=e478]:
                - paragraph [ref=e479]:
                  - strong [ref=e480]: 栈的两种实现
                  - text: ：栈可以用数组（顺序栈）或链表（链栈）实现。顺序栈访问快但容量固定；链栈动态扩容但需额外指针空间。两者在逻辑上完全等价，仅实现细节不同。
            - heading "三、过程/示例" [level=2] [ref=e481]
            - paragraph [ref=e482]:
              - text: 以括号匹配问题为例：检查
              - link "字符串" [ref=e483] [cursor=pointer]:
                - /url: "#/wiki/%E5%AD%97%E7%AC%A6%E4%B8%B2"
              - code [ref=e484]: "\"({[]})\""
              - text: 中的括号是否匹配。
            - paragraph [ref=e485]:
              - strong [ref=e486]: 步骤演示
              - text: （栈初始为空，
              - code [ref=e487]: top = -1
              - text: ）：
            - list [ref=e488]:
              - listitem [ref=e489]:
                - text: 读取
                - code [ref=e490]: "'('"
                - text: ：栈空，入栈。栈内容：
                - code [ref=e491]: "[ '(' ]"
                - text: ，
                - code [ref=e492]: top = 0
                - text: 。
              - listitem [ref=e493]:
                - text: 读取
                - code [ref=e494]: "'{'"
                - text: ：栈顶为
                - code [ref=e495]: "'('"
                - text: ，不是匹配对，入栈。栈内容：
                - code [ref=e496]: "[ '(', '{' ]"
                - text: ，
                - code [ref=e497]: top = 1
                - text: 。
              - listitem [ref=e498]:
                - text: 读取
                - code [ref=e499]: "'['"
                - text: ：栈顶为
                - code [ref=e500]: "'{'"
                - text: ，入栈。栈内容：
                - code [ref=e501]: "[ '(', '{', '[' ]"
                - text: ，
                - code [ref=e502]: top = 2
                - text: 。
              - listitem [ref=e503]:
                - text: 读取
                - code [ref=e504]: "']'"
                - text: ：栈顶为
                - code [ref=e505]: "'['"
                - text: ，匹配，出栈。栈内容：
                - code [ref=e506]: "[ '(', '{' ]"
                - text: ，
                - code [ref=e507]: top = 1
                - text: 。
              - listitem [ref=e508]:
                - text: 读取
                - code [ref=e509]: "'}'"
                - text: ：栈顶为
                - code [ref=e510]: "'{'"
                - text: ，匹配，出栈。栈内容：
                - code [ref=e511]: "[ '(' ]"
                - text: ，
                - code [ref=e512]: top = 0
                - text: 。
              - listitem [ref=e513]:
                - text: 读取
                - code [ref=e514]: "')'"
                - text: ：栈顶为
                - code [ref=e515]: "'('"
                - text: ，匹配，出栈。栈内容：
                - code [ref=e516]: "[]"
                - text: ，
                - code [ref=e517]: top = -1
                - text: 。
              - listitem [ref=e518]: 字符串遍历结束，栈为空，匹配成功。
            - paragraph [ref=e519]:
              - text: 若输入为
              - code [ref=e520]: "\"({[})\""
              - text: ，则在第5步读取
              - code [ref=e521]: "'}'"
              - text: 时，栈顶为
              - code [ref=e522]: "'['"
              - text: ，不匹配，立即报错。该过程展示了栈如何通过 LIFO 特性确保括号的嵌套顺序正确。
            - heading "四、复杂度/性质分析" [level=2] [ref=e523]
            - list [ref=e524]:
              - listitem [ref=e525]:
                - paragraph [ref=e526]:
                  - strong [ref=e527]: 时间复杂度
                  - text: ：
                - list [ref=e528]:
                  - listitem [ref=e529]:
                    - text: 入栈（Push）、出栈（Pop）、取栈顶（Top）、判空（IsEmpty）：均为
                    - strong [ref=e530]: O(1)
                    - text: ，即常数时间。这是栈最突出的优势——所有基本操作与栈中元素个数无关。
                  - listitem [ref=e531]: 注意：若栈用动态数组实现，当容量不足时需扩容（通常翻倍），此时单次 Push 可能为 O(n)，但均摊后仍为 O(1)。
              - listitem [ref=e532]:
                - paragraph [ref=e533]:
                  - strong [ref=e534]: 空间复杂度
                  - text: ：
                - list [ref=e535]:
                  - listitem [ref=e536]: 顺序栈：O(n)，其中 n 为栈的最大容量（或当前元素个数）。
                  - listitem [ref=e537]: 链栈：O(n)，每个节点额外存储指针，常数因子略大。
              - listitem [ref=e538]:
                - paragraph [ref=e539]:
                  - strong [ref=e540]: 稳定性
                  - text: ：栈的操作不涉及元素比较或交换，因此“稳定性”概念不适用。但若从元素相对顺序看，栈的 LIFO 特性会反转元素顺序（先入栈的后出栈），这与
                  - link "队列" [ref=e541] [cursor=pointer]:
                    - /url: "#/wiki/queue"
                  - text: 的 FIFO 形成对比。
              - listitem [ref=e542]:
                - paragraph [ref=e543]:
                  - strong [ref=e544]: 收敛性
                  - text: ：栈本身不涉及迭代或数值逼近，无收敛性问题。但在某些算法（如深度优先搜索）中，栈的深度决定了递归或搜索的深度，若栈空间不足可能导致栈溢出（Stack Overflow）。
            - heading "五、常见误区" [level=2] [ref=e545]
            - list [ref=e546]:
              - listitem [ref=e547]:
                - paragraph [ref=e548]:
                  - strong [ref=e549]: 混淆栈与队列
                  - text: ：栈是 LIFO（后进先出），队列是 FIFO（先进先出）。初学者常将两者混用，尤其在实现 BFS 和 DFS 时。记住：DFS 用栈（或递归），BFS 用队列。
              - listitem [ref=e550]:
                - paragraph [ref=e551]:
                  - strong [ref=e552]: 误认为栈可以随机访问
                  - text: ：栈只允许访问栈顶元素。试图通过下标访问栈中其他元素（如
                  - code [ref=e553]: stack[2]
                  - text: ）是错误用法，违背栈的抽象定义。若需随机访问，应使用数组或列表。
              - listitem [ref=e554]:
                - paragraph [ref=e555]:
                  - strong [ref=e556]: 栈溢出与内存泄漏混淆
                  - text: ：栈溢出（Stack Overflow）通常指递归过深或局部变量过多导致系统调用栈空间耗尽，是运行时错误。而内存泄漏是
                  - link "堆" [ref=e557] [cursor=pointer]:
                    - /url: "#/wiki/heap"
                  - text: 内存未释放。两者机制不同，但初学者常混为一谈。
              - listitem [ref=e558]:
                - paragraph [ref=e559]:
                  - strong [ref=e560]: 忽视栈顶指针的边界条件
                  - text: ：在数组实现中，出栈前必须检查栈是否为空（
                  - code [ref=e561]: top >= 0
                  - text: ），入栈前必须检查栈是否已满（
                  - code [ref=e562]: top < MAX_SIZE - 1
                  - text: ）。忽略边界检查会导致数组越界或数据丢失。
              - listitem [ref=e563]:
                - paragraph [ref=e564]:
                  - strong [ref=e565]: 认为栈只能用于基本类型
                  - text: ：栈可以存储任意类型的数据，包括结构体、对象、函数指针等。在编译器中，栈用于存储函数调用帧（包含局部变量、返回地址等），这是栈在系统编程中的核心应用。
          - generic [ref=e566]:
            - button [ref=e567] [cursor=pointer]
            - button [ref=e573] [cursor=pointer]
